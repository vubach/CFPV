name: cfpv
description: CFPV - Cross-Platform Food & Beverage Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0

  # Image
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/onboarding/
