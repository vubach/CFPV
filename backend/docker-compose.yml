version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cfpv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cfpv
      POSTGRES_PASSWORD: cfpv_dev
      POSTGRES_DB: cfpv_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cfpv -d cfpv_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cfpv-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
